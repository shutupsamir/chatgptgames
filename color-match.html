<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Color Match</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;color:#fff;gap:1rem}h2{font-size:1.8rem}p.sub{color:#666;font-size:.85rem;text-align:center;max-width:300px}#timer-bar{width:320px;height:8px;background:#1f2f5a;border-radius:999px;overflow:hidden}#timer-fill{height:100%;background:#10a37f;transition:width .1s linear;width:100%}#word{font-size:3.5rem;font-weight:900;margin:1rem 0;letter-spacing:.05em}#btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.cbtn{padding:.6rem 1.4rem;border-radius:999px;border:none;cursor:pointer;font-size:1rem;font-weight:700;color:#fff;transition:transform .1s}.cbtn:hover{transform:scale(1.05)}
#score{font-size:1rem;color:#aaa}#msg{font-size:1rem;color:#10a37f;min-height:1.4em}button.start{padding:.5rem 1.5rem;border-radius:999px;border:none;background:#10a37f;color:#fff;font-size:.9rem;cursor:pointer;font-weight:600}a.back{color:#444;font-size:.75rem;text-decoration:none}a.back:hover{color:#fff}</style>
</head><body>
<h2>🎨 Color Match</h2>
<p class="sub">Click the COLOR the word is written in — not what the word says!</p>
<div id="timer-bar"><div id="timer-fill"></div></div>
<div id="word">-</div>
<div id="btns"></div>
<div id="score">Score: <b id="sc">0</b> &nbsp;|&nbsp; Best: <b id="best">0</b></div>
<div id="msg">Press Start</div>
<button class="start" onclick="startGame()">Start</button>
<a class="back" href="index.html">← Back</a>
<script>
const colors=[{n:'Red',c:'#ef4444'},{n:'Blue',c:'#3b82f6'},{n:'Green',c:'#22c55e'},{n:'Yellow',c:'#facc15'},{n:'Purple',c:'#a855f7'},{n:'Orange',c:'#f97316'}];
let score=0,best=0,round=0,timerInterval,timeLeft,correctColor,running=false;
const wordEl=document.getElementById('word'),btnsEl=document.getElementById('btns'),scEl=document.getElementById('sc'),bestEl=document.getElementById('best'),msgEl=document.getElementById('msg'),fill=document.getElementById('timer-fill');
function shuffle(a){return a.sort(()=>Math.random()-.5);}
function nextRound(){
  const display=colors[Math.floor(Math.random()*colors.length)];
  correctColor=colors[Math.floor(Math.random()*colors.length)];
  wordEl.textContent=display.n;wordEl.style.color=correctColor.c;
  const opts=shuffle([correctColor,...colors.filter(c=>c!==correctColor).slice(0,3)]);
  btnsEl.innerHTML='';
  opts.forEach(o=>{const b=document.createElement('button');b.className='cbtn';b.style.background=o.c;b.textContent=o.n;b.onclick=()=>answer(o===correctColor);btnsEl.appendChild(b);});
  timeLeft=2500;clearInterval(timerInterval);
  timerInterval=setInterval(()=>{timeLeft-=50;fill.style.width=(timeLeft/2500*100)+'%';if(timeLeft<=0){clearInterval(timerInterval);answer(false);}},50);
}
function answer(correct){
  clearInterval(timerInterval);
  if(correct){score++;if(score>best){best=parseInt(bestEl.textContent)||0;if(score>best)bestEl.textContent=score;}scEl.textContent=score;msgEl.textContent='Correct! ✅';setTimeout(nextRound,400);}
  else{msgEl.textContent=`Wrong! Score: ${score}. Tap Start again.`;score=0;scEl.textContent=0;running=false;wordEl.textContent='-';btnsEl.innerHTML='';}
}
function startGame(){if(running)return;running=true;score=0;scEl.textContent=0;msgEl.textContent='';nextRound();}
</script></body></html>
