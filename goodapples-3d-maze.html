<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoodApples — Walk Through Our Orchard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'DM Sans', sans-serif; }
  canvas { display: block; }

  /* Loading Screen */
  #loader {
    position: fixed; inset: 0; z-index: 1000;
    background: #111208;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.8s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  #loader h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 3rem;
    color: #FAF7F0; letter-spacing: -0.04em;
    margin-bottom: 0.5rem;
  }
  #loader .apple-spin {
    font-size: 4rem;
    animation: spin3d 2s ease-in-out infinite;
    margin-bottom: 1.5rem;
  }
  @keyframes spin3d {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
  #loader p {
    color: rgba(250,247,240,0.5);
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }
  .load-bar-wrap {
    width: 240px; height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 100px; overflow: hidden;
  }
  .load-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #E8392A, #F4C430, #52B788);
    border-radius: 100px;
    transition: width 0.3s ease;
  }

  /* Start Overlay */
  #startOverlay {
    position: fixed; inset: 0; z-index: 900;
    background: rgba(17,18,8,0.85);
    backdrop-filter: blur(20px);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
  }
  #startOverlay.show { display: flex; }
  #startOverlay h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 2.5rem;
    color: #FAF7F0; letter-spacing: -0.03em;
    margin-bottom: 0.5rem;
  }
  #startOverlay .subtitle {
    color: rgba(250,247,240,0.5);
    font-size: 1rem; margin-bottom: 2.5rem;
  }
  #startOverlay .start-btn {
    background: #E8392A; color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 1.2rem;
    padding: 1rem 3rem; border-radius: 100px;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
    animation: pulse 2s ease-in-out infinite;
    transition: transform 0.2s;
  }
  #startOverlay .start-btn:hover { transform: scale(1.05); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,57,42,0.4); }
    50% { box-shadow: 0 0 0 20px rgba(232,57,42,0); }
  }
  .controls-hint {
    margin-top: 2rem;
    display: flex; gap: 2rem;
    color: rgba(250,247,240,0.4);
    font-size: 0.8rem;
  }
  .controls-hint div {
    display: flex; flex-direction: column;
    align-items: center; gap: 0.3rem;
  }
  .key-group { display: flex; gap: 4px; }
  .key {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.75rem;
    color: rgba(250,247,240,0.7);
  }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100; padding: 1.2rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    pointer-events: none;
    opacity: 0; transition: opacity 0.5s;
  }
  #hud.show { opacity: 1; }
  .hud-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.3rem;
    color: #FAF7F0; letter-spacing: -0.03em;
    display: flex; align-items: center; gap: 0.4rem;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .hud-nav {
    display: flex; gap: 1rem;
  }
  .hud-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(250,247,240,0.3);
    border: 1px solid rgba(250,247,240,0.2);
    transition: all 0.3s;
  }
  .hud-dot.active { background: #E8392A; transform: scale(1.4); }

  /* Crosshair */
  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
    pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  #crosshair.show { opacity: 0.6; }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: #FAF7F0;
  }
  #crosshair::before {
    width: 16px; height: 2px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  #crosshair::after {
    width: 2px; height: 16px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Info Panel Popup (2D overlay when approaching a station) */
  #infoPanel {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    z-index: 200;
    background: rgba(17,18,8,0.9);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(250,247,240,0.15);
    border-radius: 20px;
    padding: 2rem 2.5rem;
    max-width: 540px; width: 90%;
    color: #FAF7F0;
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
  }
  #infoPanel.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  #infoPanel .panel-tag {
    font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 0.12em; color: #F4C430;
    font-weight: 700; margin-bottom: 0.5rem;
  }
  #infoPanel h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.6rem;
    letter-spacing: -0.03em;
    margin-bottom: 0.6rem;
  }
  #infoPanel p {
    font-size: 0.9rem; line-height: 1.7;
    color: rgba(250,247,240,0.7);
    font-weight: 300;
  }
  #infoPanel .panel-accent {
    display: inline-block;
    background: linear-gradient(90deg, #E8392A, #F07D3A);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Minimap */
  #minimap {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    z-index: 100;
    width: 140px; height: 140px;
    background: rgba(17,18,8,0.7);
    border: 1px solid rgba(250,247,240,0.15);
    border-radius: 12px;
    pointer-events: none;
    opacity: 0; transition: opacity 0.5s;
    overflow: hidden;
  }
  #minimap.show { opacity: 0.8; }
  #minimapCanvas { width: 100%; height: 100%; }

  /* ESC hint */
  #escHint {
    position: fixed; bottom: 1rem; left: 1rem;
    z-index: 100; color: rgba(250,247,240,0.25);
    font-size: 0.7rem;
    pointer-events: none;
    opacity: 0; transition: opacity 0.5s;
  }
  #escHint.show { opacity: 1; }

  @media (max-width: 768px) {
    #startOverlay h2 { font-size: 1.8rem; }
    .controls-hint { display: none; }
    #minimap { width: 100px; height: 100px; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loader">
  <div class="apple-spin">🍎</div>
  <h1>GoodApples</h1>
  <p>Growing your orchard...</p>
  <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
</div>

<!-- Start -->
<div id="startOverlay">
  <h2>Enter the Orchard</h2>
  <p class="subtitle">An immersive walk through what we build</p>
  <button class="start-btn" id="startBtn">Click to Explore</button>
  <div class="controls-hint">
    <div>
      <div class="key-group">
        <span class="key">W</span>
      </div>
      <div class="key-group">
        <span class="key">A</span>
        <span class="key">S</span>
        <span class="key">D</span>
      </div>
      Move
    </div>
    <div>
      <div class="key-group"><span class="key" style="width:60px">Mouse</span></div>
      <div style="height:32px"></div>
      Look
    </div>
    <div>
      <div class="key-group"><span class="key" style="width:50px">ESC</span></div>
      <div style="height:32px"></div>
      Pause
    </div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-logo"><span>🍎</span> GoodApples</div>
  <div class="hud-nav" id="hudDots"></div>
</div>
<div id="crosshair"></div>
<div id="minimap"><canvas id="minimapCanvas" width="140" height="140"></canvas></div>
<div id="escHint" class="show">ESC to pause</div>

<!-- Info Panel -->
<div id="infoPanel">
  <div class="panel-tag" id="panelTag"></div>
  <h3 id="panelTitle"></h3>
  <p id="panelBody"></p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ── CONFIG ──
const COLORS = {
  red: 0xE8392A, green: 0x2D6A4F, greenLight: 0x52B788,
  cream: 0xFAF7F0, dark: 0x111208, yellow: 0xF4C430,
  orange: 0xF07D3A, orchidPink: 0xDA70D6, orchidDeep: 0x8B008B,
  orchidWhite: 0xFFF0F5, leafGreen: 0x228B22
};

// ── STATIONS (content zones in the maze) ──
const STATIONS = [
  {
    tag: 'Welcome', title: 'Your business deserves a better online presence.',
    body: 'Too many great businesses are invisible online. GoodApples builds stunning, high-performing websites and apps that help your business thrive — in every way imaginable.',
    pos: [0, 0, -8], color: COLORS.red
  },
  {
    tag: 'Services', title: 'Every service you need to grow online.',
    body: 'Website Design & Build — Beautiful, blazing-fast websites. App Development — Custom apps that solve real problems. SEO & Visibility — Get found by the right people. Brand & Identity — Tell your story without words.',
    pos: [20, 0, -25], color: COLORS.greenLight
  },
  {
    tag: 'How It Works', title: 'From zero to unforgettable — fast.',
    body: '1. Discovery Call — We learn everything about your goals. 2. Strategy & Design — We map out your digital strategy. 3. Build & Test — Clean code, thorough testing. 4. Launch & Grow — Optimize, iterate, grow long-term.',
    pos: [35, 0, -50], color: COLORS.yellow
  },
  {
    tag: 'Why GoodApples', title: 'We want to be the very best. Full stop.',
    body: 'We genuinely care about your success. We treat every project like our own business. We\'re obsessed with quality — beautiful design, clean code, measurable results. No fluff, no jargon.',
    pos: [15, 0, -70], color: COLORS.orange
  },
  {
    tag: 'Client Love', title: 'Real businesses. Real results.',
    body: '"GoodApples completely transformed our online presence." — Sarah M. "Our leads doubled within 3 months." — David K. "The audit alone was worth every penny." — Priya T.',
    pos: [-10, 0, -85], color: COLORS.orchidPink
  },
  {
    tag: 'Pricing', title: 'Simple, honest pricing. No surprises.',
    body: 'Seedling $799 — Up to 5-page website, mobile-responsive. Orchard $2,499 — Up to 15 pages, custom design & animations, advanced SEO. Harvest $5,999 — Full-scale digital transformation.',
    pos: [-25, 0, -60], color: COLORS.cream
  },
  {
    tag: "Let's Go", title: 'Your business is ready. Is your website?',
    body: "Let's fix that. Book a free discovery call and we'll show you exactly what's possible. hello@goodapples.dev",
    pos: [-15, 0, -35], color: COLORS.red
  }
];

// ── SCENE SETUP ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
scene.fog = new THREE.FogExp2(0x050508, 0.018);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 2);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
document.body.appendChild(renderer.domElement);

// ── POST PROCESSING ──
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.4, 0.85
);
composer.addPass(bloomPass);

// ── CONTROLS ──
const controls = new PointerLockControls(camera, renderer.domElement);
scene.add(controls.getObject());

// ── MOVEMENT ──
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
const keys = {};
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;

document.addEventListener('keydown', e => {
  switch(e.code) {
    case 'KeyW': case 'ArrowUp': moveForward = true; break;
    case 'KeyS': case 'ArrowDown': moveBackward = true; break;
    case 'KeyA': case 'ArrowLeft': moveLeft = true; break;
    case 'KeyD': case 'ArrowRight': moveRight = true; break;
  }
});
document.addEventListener('keyup', e => {
  switch(e.code) {
    case 'KeyW': case 'ArrowUp': moveForward = false; break;
    case 'KeyS': case 'ArrowDown': moveBackward = false; break;
    case 'KeyA': case 'ArrowLeft': moveLeft = false; break;
    case 'KeyD': case 'ArrowRight': moveRight = false; break;
  }
});

controls.addEventListener('lock', () => {
  document.getElementById('startOverlay').classList.remove('show');
  document.getElementById('hud').classList.add('show');
  document.getElementById('crosshair').classList.add('show');
  document.getElementById('minimap').classList.add('show');
  document.getElementById('escHint').classList.add('show');
});
controls.addEventListener('unlock', () => {
  document.getElementById('startOverlay').classList.add('show');
  document.getElementById('hud').classList.remove('show');
  document.getElementById('crosshair').classList.remove('show');
  document.getElementById('minimap').classList.remove('show');
  document.getElementById('infoPanel').classList.remove('show');
});

// ── LIGHTING ──
const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.3);
scene.add(ambientLight);

// Moonlight
const moonLight = new THREE.DirectionalLight(0x6688cc, 0.4);
moonLight.position.set(-30, 50, -20);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(2048, 2048);
moonLight.shadow.camera.near = 0.5;
moonLight.shadow.camera.far = 150;
moonLight.shadow.camera.left = -60;
moonLight.shadow.camera.right = 60;
moonLight.shadow.camera.top = 60;
moonLight.shadow.camera.bottom = -60;
scene.add(moonLight);

// ── GROUND ──
const groundGeo = new THREE.PlaneGeometry(200, 200, 100, 100);
// Gentle undulation
const posAttr = groundGeo.attributes.position;
for (let i = 0; i < posAttr.count; i++) {
  const x = posAttr.getX(i);
  const y = posAttr.getY(i);
  posAttr.setZ(i, Math.sin(x * 0.05) * 0.3 + Math.cos(y * 0.07) * 0.2);
}
groundGeo.computeVertexNormals();
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0a1a0a, roughness: 0.95, metalness: 0.0
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Mossy ground patches
for (let i = 0; i < 60; i++) {
  const patchGeo = new THREE.CircleGeometry(Math.random() * 3 + 1, 16);
  const patchMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(0.28 + Math.random() * 0.05, 0.4, 0.08 + Math.random() * 0.05),
    roughness: 1, transparent: true, opacity: 0.6
  });
  const patch = new THREE.Mesh(patchGeo, patchMat);
  patch.rotation.x = -Math.PI / 2;
  patch.position.set(
    (Math.random() - 0.5) * 120,
    0.01,
    (Math.random() - 0.5) * 120 - 40
  );
  scene.add(patch);
}

// ── HEDGE WALLS (maze structure) ──
const hedgeMaterial = new THREE.MeshStandardMaterial({
  color: 0x1a3a1a, roughness: 0.85, metalness: 0,
});

function createHedgeWall(x, z, width, depth, height = 4, rotY = 0) {
  const geo = new THREE.BoxGeometry(width, height, depth);
  const mesh = new THREE.Mesh(geo, hedgeMaterial);
  mesh.position.set(x, height / 2, z);
  mesh.rotation.y = rotY;
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Add leafy bumps on top
  for (let i = 0; i < Math.floor(width / 1.5); i++) {
    const bumpGeo = new THREE.SphereGeometry(0.6 + Math.random() * 0.4, 8, 6);
    const bumpMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0.28 + Math.random() * 0.06, 0.5 + Math.random() * 0.2, 0.12 + Math.random() * 0.08),
      roughness: 0.9
    });
    const bump = new THREE.Mesh(bumpGeo, bumpMat);
    bump.position.set(
      x + (i - width / 3) * 1.2 * Math.cos(rotY) + (Math.random() - 0.5),
      height + 0.2,
      z + (i - width / 3) * 1.2 * Math.sin(rotY) + (Math.random() - 0.5)
    );
    bump.scale.y = 0.7;
    scene.add(bump);
  }

  return mesh;
}

// Maze layout — winding path through stations
const walls = [];
// Entrance corridor
walls.push(createHedgeWall(-4, -3, 1.5, 14));
walls.push(createHedgeWall(4, -3, 1.5, 14));

// First turn area (around station 0 at 0,0,-8)
walls.push(createHedgeWall(-4, -12, 1.5, 8));
walls.push(createHedgeWall(4, -15, 1.5, 14));
walls.push(createHedgeWall(8, -12, 12, 1.5));

// Corridor to station 1 (20, -25)
walls.push(createHedgeWall(12, -18, 1.5, 14));
walls.push(createHedgeWall(12, -30, 1.5, 10));
walls.push(createHedgeWall(4, -22, 1.5, 8));
walls.push(createHedgeWall(15, -17, 8, 1.5));
walls.push(createHedgeWall(26, -20, 1.5, 12));
walls.push(createHedgeWall(15, -26, 1.5, 10));

// Turn toward station 2 (35, -50)
walls.push(createHedgeWall(26, -32, 1.5, 14));
walls.push(createHedgeWall(30, -34, 10, 1.5));
walls.push(createHedgeWall(40, -40, 1.5, 14));
walls.push(createHedgeWall(30, -45, 1.5, 12));

// Path to station 3 (15, -70)
walls.push(createHedgeWall(40, -55, 1.5, 12));
walls.push(createHedgeWall(32, -56, 14, 1.5));
walls.push(createHedgeWall(25, -62, 1.5, 14));
walls.push(createHedgeWall(10, -65, 1.5, 12));
walls.push(createHedgeWall(20, -75, 14, 1.5));

// Path to station 4 (-10, -85)
walls.push(createHedgeWall(5, -78, 1.5, 10));
walls.push(createHedgeWall(-5, -76, 1.5, 10));
walls.push(createHedgeWall(-15, -80, 1.5, 12));
walls.push(createHedgeWall(0, -90, 14, 1.5));

// Path to station 5 (-25, -60)
walls.push(createHedgeWall(-18, -88, 1.5, 8));
walls.push(createHedgeWall(-30, -75, 1.5, 20));
walls.push(createHedgeWall(-20, -55, 1.5, 12));

// Path to station 6 (-15, -35)
walls.push(createHedgeWall(-30, -50, 14, 1.5));
walls.push(createHedgeWall(-22, -40, 1.5, 14));
walls.push(createHedgeWall(-8, -30, 1.5, 12));

// ── ORCHID CREATION ──
function createOrchid(x, y, z, color = COLORS.orchidPink, scale = 1) {
  const group = new THREE.Group();

  // Stem
  const stemGeo = new THREE.CylinderGeometry(0.03 * scale, 0.05 * scale, 1.2 * scale, 6);
  const stemMat = new THREE.MeshStandardMaterial({ color: 0x2d5a2d, roughness: 0.8 });
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.y = 0.6 * scale;
  group.add(stem);

  // Petals
  const petalCount = 5;
  const petalGeo = new THREE.SphereGeometry(0.18 * scale, 8, 6);
  petalGeo.scale(1, 0.3, 1.8);
  for (let i = 0; i < petalCount; i++) {
    const angle = (i / petalCount) * Math.PI * 2;
    const petalMat = new THREE.MeshStandardMaterial({
      color: color,
      emissive: color,
      emissiveIntensity: 0.3,
      roughness: 0.4, metalness: 0.1,
      transparent: true, opacity: 0.9
    });
    const petal = new THREE.Mesh(petalGeo, petalMat);
    petal.position.set(
      Math.cos(angle) * 0.2 * scale,
      1.2 * scale,
      Math.sin(angle) * 0.2 * scale
    );
    petal.rotation.z = Math.cos(angle) * 0.4;
    petal.rotation.x = Math.sin(angle) * 0.4;
    group.add(petal);
  }

  // Center glow
  const centerGeo = new THREE.SphereGeometry(0.08 * scale, 8, 8);
  const centerMat = new THREE.MeshStandardMaterial({
    color: COLORS.yellow,
    emissive: COLORS.yellow,
    emissiveIntensity: 0.8
  });
  const center = new THREE.Mesh(centerGeo, centerMat);
  center.position.y = 1.2 * scale;
  group.add(center);

  // Point light from the flower
  const flowerLight = new THREE.PointLight(color, 0.8, 6);
  flowerLight.position.y = 1.3 * scale;
  group.add(flowerLight);

  // Leaves
  for (let i = 0; i < 3; i++) {
    const leafGeo = new THREE.SphereGeometry(0.15 * scale, 6, 4);
    leafGeo.scale(1, 0.2, 3);
    const leafMat = new THREE.MeshStandardMaterial({
      color: 0x1a5a1a, roughness: 0.7,
      side: THREE.DoubleSide
    });
    const leaf = new THREE.Mesh(leafGeo, leafMat);
    const la = (i / 3) * Math.PI * 2 + Math.random();
    leaf.position.set(Math.cos(la) * 0.15, 0.15, Math.sin(la) * 0.15);
    leaf.rotation.z = Math.cos(la) * 0.6;
    group.add(leaf);
  }

  group.position.set(x, y, z);
  group.userData.baseY = y;
  group.userData.phase = Math.random() * Math.PI * 2;
  scene.add(group);
  return group;
}

// Orchid clusters near each station + scattered throughout
const orchids = [];
const orchidColors = [COLORS.orchidPink, COLORS.orchidDeep, COLORS.orchidWhite, 0xFF69B4, 0xBA55D3, 0x9370DB];

STATIONS.forEach((station, idx) => {
  const [sx, , sz] = station.pos;
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const dist = 2 + Math.random() * 3;
    const ox = sx + Math.cos(angle) * dist;
    const oz = sz + Math.sin(angle) * dist;
    const color = orchidColors[Math.floor(Math.random() * orchidColors.length)];
    const scale = 0.6 + Math.random() * 0.8;
    orchids.push(createOrchid(ox, 0, oz, color, scale));
  }
});

// Scattered orchids along paths
for (let i = 0; i < 80; i++) {
  const ox = (Math.random() - 0.5) * 100;
  const oz = -Math.random() * 100;
  const color = orchidColors[Math.floor(Math.random() * orchidColors.length)];
  orchids.push(createOrchid(ox, 0, oz, color, 0.5 + Math.random() * 0.6));
}

// ── TREES (tall canopy) ──
function createTree(x, z) {
  const group = new THREE.Group();

  // Trunk
  const trunkGeo = new THREE.CylinderGeometry(0.15, 0.3, 6, 8);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = 3;
  trunk.castShadow = true;
  group.add(trunk);

  // Canopy
  for (let i = 0; i < 4; i++) {
    const canopyGeo = new THREE.SphereGeometry(1.5 + Math.random(), 8, 6);
    const canopyMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0.28 + Math.random() * 0.05, 0.4, 0.08 + Math.random() * 0.04),
      roughness: 0.9, transparent: true, opacity: 0.85
    });
    const canopy = new THREE.Mesh(canopyGeo, canopyMat);
    canopy.position.set(
      (Math.random() - 0.5) * 1.5,
      5.5 + Math.random() * 1.5,
      (Math.random() - 0.5) * 1.5
    );
    canopy.castShadow = true;
    group.add(canopy);
  }

  group.position.set(x, 0, z);
  scene.add(group);
}

for (let i = 0; i < 40; i++) {
  createTree(
    (Math.random() - 0.5) * 140,
    -Math.random() * 120
  );
}

// ── STATION MARKERS (glowing pillars in the maze) ──
const stationMeshes = [];
STATIONS.forEach((station, idx) => {
  const [sx, , sz] = station.pos;

  // Stone pedestal
  const pedestalGeo = new THREE.CylinderGeometry(0.8, 1, 0.3, 16);

  const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
  pedestal.position.set(sx, 0.15, sz);
  scene.add(pedestal);

  // Glowing crystal
  const crystalGeo = new THREE.OctahedronGeometry(0.4, 0);
  const crystalMat = new THREE.MeshStandardMaterial({
    color: station.color,
    emissive: station.color,
    emissiveIntensity: 0.6,
    transparent: true, opacity: 0.85,
    roughness: 0.1, metalness: 0.8
  });
  const crystal = new THREE.Mesh(crystalGeo, crystalMat);
  crystal.position.set(sx, 1.5, sz);
  crystal.userData.stationIdx = idx;
  crystal.userData.baseY = 1.5;
  crystal.userData.phase = Math.random() * Math.PI * 2;

// ── FIREFLY PARTICLES ──
const particleCount = 800;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
const particleColors = new Float32Array(particleCount * 3);

  particlePositions[i * 3] = (Math.random() - 0.5) * 120;
  particlePositions[i * 3 + 1] = Math.random() * 5 + 0.5;
  particlePositions[i * 3 + 2] = -Math.random() * 110;
  particleSizes[i] = Math.random() * 3 + 1;

  const c = new THREE.Color();
  const hue = Math.random() > 0.7 ? 0.15 : (Math.random() > 0.5 ? 0.8 : 0.3);

  particleColors[i * 3 + 1] = c.g;
  particleColors[i * 3 + 2] = c.b;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

const particleMat = new THREE.PointsMaterial({
  size: 0.15,
  vertexColors: true,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ── ARCHWAY at entrance ──
function createArch(x, z) {
  const archMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.5, metalness: 0.4 });
  // Left pillar
  const pillarGeo = new THREE.CylinderGeometry(0.2, 0.25, 4, 8);
  const lp = new THREE.Mesh(pillarGeo, archMat);
  lp.position.set(x - 1.8, 2, z);
  scene.add(lp);
  const rp = new THREE.Mesh(pillarGeo, archMat);
  rp.position.set(x + 1.8, 2, z);
  scene.add(rp);
  // Arch top
  const archTopGeo = new THREE.TorusGeometry(1.8, 0.15, 8, 16, Math.PI);
  const archTop = new THREE.Mesh(archTopGeo, archMat);
  archTop.position.set(x, 4, z);
  archTop.rotation.y = Math.PI / 2;
  scene.add(archTop);
  // Sign
  const signGeo = new THREE.PlaneGeometry(2.5, 0.6);
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#111208';
  ctx.fillRect(0, 0, 512, 128);
  ctx.font = '700 48px Syne, sans-serif';
  ctx.fillStyle = '#FAF7F0';
  ctx.textAlign = 'center';
  ctx.fillText('GoodApples', 256, 80);
  const signTex = new THREE.CanvasTexture(canvas);
  const signMat = new THREE.MeshStandardMaterial({
    map: signTex, emissive: 0xffffff, emissiveMap: signTex, emissiveIntensity: 0.3
  });
  const sign = new THREE.Mesh(signGeo, signMat);
  sign.position.set(x, 4.4, z);
  scene.add(sign);
}
createArch(0, 1);

// ── MINIMAP ──
const minimapCanvas = document.getElementById('minimapCanvas');
const mCtx = minimapCanvas.getContext('2d');

function drawMinimap() {
  mCtx.clearRect(0, 0, 140, 140);
  mCtx.fillStyle = 'rgba(10,20,10,0.8)';
  mCtx.fillRect(0, 0, 140, 140);

  const scale = 0.9;
  const cx = 70;
  const cy = 70;
  const px = camera.position.x;
  const pz = camera.position.z;

  // Station dots
  STATIONS.forEach((s, i) => {
    const dx = (s.pos[0] - px) * scale + cx;
    const dy = (s.pos[2] - pz) * scale + cy;
    if (dx > 0 && dx < 140 && dy > 0 && dy < 140) {
      const c = new THREE.Color(s.color);
      mCtx.fillStyle = `rgb(${Math.floor(c.r*255)},${Math.floor(c.g*255)},${Math.floor(c.b*255)})`;
      mCtx.beginPath();
      mCtx.arc(dx, dy, 3, 0, Math.PI * 2);
      mCtx.fill();
    }
  });

  // Player
  mCtx.fillStyle = '#E8392A';
  mCtx.beginPath();
  mCtx.arc(cx, cy, 4, 0, Math.PI * 2);
  mCtx.fill();

  // Direction indicator
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  mCtx.strokeStyle = '#FAF7F0';
  mCtx.lineWidth = 2;
  mCtx.beginPath();
  mCtx.moveTo(cx, cy);
  mCtx.lineTo(cx + dir.x * 10, cy + dir.z * 10);
  mCtx.stroke();
}

// ── HUD DOTS ──
const hudDots = document.getElementById('hudDots');
STATIONS.forEach((s, i) => {

  dot.className = 'hud-dot';
  dot.id = `dot-${i}`;
  hudDots.appendChild(dot);
});

// ── PROXIMITY CHECK ──
let activeStation = -1;

function checkProximity() {
  const px = camera.position.x;
  const pz = camera.position.z;
  let nearest = -1;
  let nearDist = Infinity;

  STATIONS.forEach((s, i) => {
    const dx = px - s.pos[0];
    const dz = pz - s.pos[2];
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 6 && dist < nearDist) {
      nearest = i;
      nearDist = dist;
    }
  });

  if (nearest !== activeStation) {
    activeStation = nearest;
    const panel = document.getElementById('infoPanel');
    // Update HUD dots
    STATIONS.forEach((_, i) => {
      const dot = document.getElementById(`dot-${i}`);
      dot.classList.toggle('active', i === nearest);
    });

    if (nearest >= 0) {
      const s = STATIONS[nearest];
      document.getElementById('panelTag').textContent = s.tag;
      document.getElementById('panelTitle').textContent = s.title;
      document.getElementById('panelBody').textContent = s.body;
      panel.classList.add('show');
    } else {
      panel.classList.remove('show');
    }
  }
}

// ── LOADING ──
let loaded = false;
const loadBar = document.getElementById('loadBar');
let loadProgress = 0;

function simulateLoad() {
  loadProgress += Math.random() * 15 + 5;
  if (loadProgress >= 100) {
    loadProgress = 100;
    loadBar.style.width = '100%';
    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('startOverlay').classList.add('show');
      loaded = true;
    }, 500);
    return;
  }
  loadBar.style.width = loadProgress + '%';
  setTimeout(simulateLoad, 100 + Math.random() * 200);
}
simulateLoad();

// ── START BUTTON ──
document.getElementById('startBtn').addEventListener('click', () => {
  controls.lock();
});

// ── ANIMATION LOOP ──
const clock = new THREE.Clock();
let prevTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const time = performance.now();
  const delta = (time - prevTime) / 1000;
  prevTime = time;
  const elapsed = clock.getElapsedTime();

  if (controls.isLocked) {
    // Movement
    velocity.x -= velocity.x * 8.0 * delta;
    velocity.z -= velocity.z * 8.0 * delta;

    direction.z = Number(moveForward) - Number(moveBackward);
    direction.x = Number(moveRight) - Number(moveLeft);
    direction.normalize();

    const speed = 12;
    if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
    if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

    controls.moveRight(-velocity.x * delta);
    controls.moveForward(-velocity.z * delta);

    // Keep camera at eye height
    camera.position.y = 1.7;

    // Check station proximity
    checkProximity();

    // Draw minimap
    drawMinimap();
  }

  // Animate orchids (gentle sway)
  orchids.forEach(orchid => {
    orchid.position.y = orchid.userData.baseY + Math.sin(elapsed * 0.8 + orchid.userData.phase) * 0.05;
    orchid.rotation.y = Math.sin(elapsed * 0.3 + orchid.userData.phase) * 0.1;
  });

  // Animate station crystals (float + rotate)
  stationMeshes.forEach(crystal => {
    crystal.position.y = crystal.userData.baseY + Math.sin(elapsed * 1.2 + crystal.userData.phase) * 0.3;
    crystal.rotation.y = elapsed * 0.5;
    crystal.rotation.x = Math.sin(elapsed * 0.7) * 0.2;
  });

  // Animate particles (drift)
  const positions = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3] += Math.sin(elapsed * 0.3 + i) * 0.003;
    positions[i * 3 + 1] += Math.sin(elapsed * 0.5 + i * 0.5) * 0.002;
    positions[i * 3 + 2] += Math.cos(elapsed * 0.2 + i * 0.3) * 0.003;
  }
  particles.geometry.attributes.position.needsUpdate = true;
  particleMat.opacity = 0.4 + Math.sin(elapsed * 0.8) * 0.2;

  // Animate floating apple
  appleGroup.position.y = 2.5 + Math.sin(elapsed * 0.8) * 0.3;
  appleGroup.rotation.y = elapsed * 0.4;
  appleLight.position.y = appleGroup.position.y;

  // Render
  composer.render();
}

animate();

// ── RESIZE ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ── TOUCH CONTROLS FOR MOBILE ──
let touchStartX = 0, touchStartY = 0;
let touchMoveX = 0, touchMoveY = 0;
let isTouching = false;

document.addEventListener('touchstart', (e) => {
  if (!loaded) return;
  if (!controls.isLocked) {
    controls.lock();
    return;
  }
  isTouching = true;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if (!isTouching || !controls.isLocked) return;
  touchMoveX = e.touches[0].clientX - touchStartX;
  touchMoveY = e.touches[0].clientY - touchStartY;

  // Upper half = look, lower half = move
  if (touchStartY < window.innerHeight / 2) {
    // Look - handled by pointer lock on desktop, simulate on mobile
  } else {
    // Move forward/backward based on Y drag
    moveForward = touchMoveY < -20;
    moveBackward = touchMoveY > 20;
    moveLeft = touchMoveX < -20;
    moveRight = touchMoveX > 20;
  }
}, { passive: true });

document.addEventListener('touchend', () => {
  isTouching = false;
  moveForward = moveBackward = moveLeft = moveRight = false;
}, { passive: true });
</script>
