<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGPT Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      padding: 2rem;
    }
    .logo { font-size: 3rem; margin-bottom: 0.75rem; }
    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10a37f, #74aa9c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }
    p.sub { color: #666; margin-bottom: 3rem; font-size: 1rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem;
      width: 100%;
      max-width: 860px;
    }
    a.card {
      background: #16213e;
      border: 1px solid #1f2f5a;
      border-radius: 18px;
      padding: 2rem 1.25rem 1.75rem;
      text-decoration: none;
      color: #fff;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
    }
    a.card:hover {
      transform: translateY(-5px);
      border-color: #10a37f;
      box-shadow: 0 10px 35px rgba(16,163,127,0.2);
    }
    .icon { font-size: 3.5rem; }
    .card-title { font-size: 1.1rem; font-weight: 700; }
    .card-desc { font-size: 0.82rem; color: #777; line-height: 1.4; }
    .play-btn {
      margin-top: 0.5rem;
      padding: 0.4rem 1.2rem;
      border-radius: 999px;
      background: #10a37f;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
    }
    footer { margin-top: 3rem; color: #444; font-size: 0.78rem; }
  </style>
</head>
<body>
  <div class="logo">🤖</div>
  <h1>ChatGPT Games</h1>
  <p class="sub">Pick a game and play</p>
  <div class="grid">
    <a class="card" href="whack-a-mole.html">
      <div class="icon">🔨</div>
      <div class="card-title">Whack-a-Mole</div>
      <div class="card-desc">Smash moles before they disappear</div>
      <span class="play-btn">Play</span>
    </a>
    <a class="card" href="goodapples-3d-maze.html">
      <div class="icon">🍎</div>
      <div class="card-title">Good Apples Maze</div>
      <div class="card-desc">Navigate the 3D maze to collect apples</div>
      <span class="play-btn">Play</span>
    </a>
    <a class="card" href="goodapples-3d.html">
      <div class="icon">🎮</div>
      <div class="card-title">Good Apples 3D</div>
      <div class="card-desc">Full 3D apple adventure</div>
      <span class="play-btn">Play</span>
    </a>
    <a class="card" href="goodapples-remix.html">
      <div class="icon">🔀</div>
      <div class="card-title">Good Apples Remix</div>
      <div class="card-desc">A remixed twist on the classic</div>
      <span class="play-btn">Play</span>
    </a>
  </div>
  <footer>Made with ChatGPT</footer>
</body>
</html>
