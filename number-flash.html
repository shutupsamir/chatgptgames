<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/><title>Number Flash</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{touch-action:none;-webkit-tap-highlight-color:transparent;background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;color:#fff;gap:1rem;padding:1rem}h2{font-size:1.8rem}p.sub{color:#666;font-size:.85rem}#display{font-size:4rem;font-weight:900;letter-spacing:.1em;min-height:5rem;display:flex;align-items:center;justify-content:center;color:#10a37f}input{background:#16213e;border:2px solid #1f2f5a;color:#fff;font-size:1.5rem;border-radius:12px;padding:.5rem 1rem;text-align:center;width:220px;letter-spacing:.15em;outline:none}input:focus{border-color:#10a37f}#msg{font-size:1rem;color:#10a37f;min-height:1.4em}#score{font-size:.9rem;color:#666}button{padding:.5rem 1.5rem;border-radius:999px;border:none;background:#10a37f;color:#fff;font-size:.9rem;cursor:pointer;font-weight:600}a.back{color:#444;font-size:.75rem;text-decoration:none}a.back:hover{color:#fff}</style>
</head><body>
<h2>🔢 Number Flash</h2>
<p class="sub">Memorize the number, then type it back</p>
<div id="display">?</div>
<input id="inp" type="number" placeholder="Type it here" style="display:none" onkeydown="if(event.key==='Enter')check()"/>
<div id="msg">Press Start to begin</div>
<div id="score">Level: <b id="lvl">1</b> &nbsp;|&nbsp; Score: <b id="sc">0</b></div>
<button id="btn" onclick="startRound()">Start</button>
<a class="back" href="index.html">← Back</a>
<script>
let level=1,score=0,current='',phase='idle';
const disp=document.getElementById('display'),inp=document.getElementById('inp'),msg=document.getElementById('msg'),btn=document.getElementById('btn'),lvlEl=document.getElementById('lvl'),scEl=document.getElementById('sc');
function startRound(){
  if(phase==='input')return;
  current='';for(let i=0;i<level+2;i++)current+=Math.floor(Math.random()*10);
  phase='show';disp.textContent=current;inp.style.display='none';btn.style.display='none';msg.textContent='Memorize it!';
  setTimeout(()=>{disp.textContent='?';inp.value='';inp.style.display='block';inp.focus();btn.style.display='none';msg.textContent='Type it now!';phase='input';},800+level*300);
}
function check(){
  if(phase!=='input')return;
  if(inp.value===current){score+=level;level++;scEl.textContent=score;lvlEl.textContent=level;msg.textContent='Correct! ✅ Next level...';disp.textContent='✅';inp.style.display='none';btn.textContent='Next';btn.style.display='block';phase='idle';}
  else{msg.textContent=`Wrong! It was ${current}. Game over.`;disp.textContent='❌';inp.style.display='none';level=1;score=0;scEl.textContent=0;lvlEl.textContent=1;btn.textContent='Restart';btn.style.display='block';phase='idle';}
}
btn.style.display='block';
</script></body></html>
