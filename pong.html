<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Pong - 2 Players</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:monospace; color:#fff; }
  h2 { margin-bottom:12px; font-size:1.4rem; letter-spacing:2px; }
  .controls { font-size:0.75rem; color:#555; margin-bottom:10px; display:flex; gap:2rem; }
  canvas { border:2px solid #333; display:block; }
  #msg { margin-top:14px; font-size:1.1rem; min-height:1.5em; color:#10a37f; }
  a.back { margin-top:16px; color:#444; font-size:0.75rem; text-decoration:none; }
  a.back:hover { color:#fff; }
</style>
</head>
<body>
<h2>🏓 PONG</h2>
<div class="controls">
  <span>P1: W / S</span>
  <span>P2: ↑ / ↓</span>
  <span>SPACE to start</span>
</div>
<canvas id="c" width="700" height="450"></canvas>
<div id="msg">Press SPACE to start</div>
<a class="back" href="index.html">← Back to games</a>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=700,H=450,PS=90,PW=12,SPEED=5,BALL_START=4;
let running=false,scores=[0,0];
let p1={y:H/2-PS/2},p2={y:H/2-PS/2};
let ball={x:W/2,y:H/2,vx:BALL_START,vy:3};
let keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '&&!running){running=true;document.getElementById('msg').textContent='';} e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
function reset(){ball={x:W/2,y:H/2,vx:(Math.random()>0.5?1:-1)*BALL_START,vy:(Math.random()-0.5)*6};running=false;document.getElementById('msg').textContent='Press SPACE to continue';}
function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.setLineDash([8,12]);ctx.strokeStyle='#222';ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#fff';
  ctx.fillRect(20,p1.y,PW,PS);
  ctx.fillRect(W-20-PW,p2.y,PW,PS);
  ctx.beginPath();ctx.arc(ball.x,ball.y,8,0,Math.PI*2);ctx.fill();
  ctx.font='bold 36px monospace';ctx.textAlign='center';
  ctx.fillText(scores[0],W/4,50);ctx.fillText(scores[1],3*W/4,50);
}
function update(){
  if(!running)return;
  if(keys['w']||keys['W'])p1.y=Math.max(0,p1.y-SPEED);
  if(keys['s']||keys['S'])p1.y=Math.min(H-PS,p1.y+SPEED);
  if(keys['ArrowUp'])p2.y=Math.max(0,p2.y-SPEED);
  if(keys['ArrowDown'])p2.y=Math.min(H-PS,p2.y+SPEED);
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y<=8||ball.y>=H-8)ball.vy*=-1;
  if(ball.x<=20+PW+8&&ball.y>=p1.y&&ball.y<=p1.y+PS){ball.vx=Math.abs(ball.vx)*1.05;ball.vy+=(ball.y-p1.y-PS/2)*0.1;}
  if(ball.x>=W-20-PW-8&&ball.y>=p2.y&&ball.y<=p2.y+PS){ball.vx=-Math.abs(ball.vx)*1.05;ball.vy+=(ball.y-p2.y-PS/2)*0.1;}
  if(ball.x<0){scores[1]++;document.getElementById('msg').textContent='P2 scores! 🎉';reset();}
  if(ball.x>W){scores[0]++;document.getElementById('msg').textContent='P1 scores! 🎉';reset();}
}
function loop(){draw();update();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
