<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Tic Tac Toe - 2 Players</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d0d1a; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Segoe UI',sans-serif; color:#fff; }
  h2 { font-size:2rem; margin-bottom:8px; }
  #turn { font-size:1rem; margin-bottom:20px; min-height:1.4em; color:#aaa; }
  #board { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .cell { width:110px; height:110px; background:#16213e; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:3.5rem; cursor:pointer; transition:background 0.15s; border:2px solid #1f2f5a; }
  .cell:hover:not(.taken) { background:#1f2f5a; }
  .cell.taken { cursor:default; }
  #msg { margin-top:22px; font-size:1.4rem; font-weight:700; min-height:1.8em; color:#10a37f; }
  button { margin-top:14px; padding:0.5rem 1.8rem; border-radius:999px; border:none; background:#10a37f; color:#fff; font-size:0.9rem; cursor:pointer; font-weight:600; }
  a.back { margin-top:14px; color:#444; font-size:0.75rem; text-decoration:none; }
  a.back:hover { color:#fff; }
</style>
</head>
<body>
<h2>Tic Tac Toe</h2>
<div id="turn">Player 1's turn (❌)</div>
<div id="board"></div>
<div id="msg"></div>
<button onclick="restart()">Restart</button>
<a class="back" href="index.html">← Back to games</a>
<script>
let board=Array(9).fill(''),current='X',over=false;
const marks={X:'❌',O:'⭕'};
const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const boardEl=document.getElementById('board');
const turnEl=document.getElementById('turn');
const msgEl=document.getElementById('msg');

function render(){
  boardEl.innerHTML='';
  board.forEach((v,i)=>{
    const cell=document.createElement('div');
    cell.className='cell'+(v?' taken':'');
    cell.textContent=marks[v]||'';
    cell.addEventListener('click',()=>play(i));
    boardEl.appendChild(cell);
  });
}

function play(i){
  if(over||board[i])return;
  board[i]=current;
  render();
  const winner=checkWin();
  if(winner){msgEl.textContent=`Player ${current==='X'?1:2} wins! ${marks[current]} 🎉`;turnEl.textContent='';over=true;return;}
  if(board.every(v=>v)){msgEl.textContent="It's a draw!";over=true;return;}
  current=current==='X'?'O':'X';
  turnEl.textContent=`Player ${current==='X'?1:2}'s turn (${marks[current]})`;
}

function checkWin(){return wins.some(([a,b,c])=>board[a]&&board[a]===board[b]&&board[a]===board[c]);}
function restart(){board=Array(9).fill('');current='X';over=false;msgEl.textContent='';turnEl.textContent="Player 1's turn (❌)";render();}
render();
</script>
</body>
</html>
